<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUVYAA Scraper Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            justify-content: center;
        }
        .nav button {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover {
            background: #ff6b6b;
            border-color: #ff6b6b;
            color: #fff;
        }
        .nav button.active {
            background: #ff6b6b;
            border-color: #ff6b6b;
        }
        .panel {
            background: #141414;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        .panel.hidden {
            display: none;
        }
        input,
        select {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            width: 100%;
            max-width: 300px;
            margin: 5px 0;
        }
        input:focus,
        select:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        .btn-primary {
            background: #ff6b6b;
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .btn-primary:hover {
            background: #ff5252;
        }
        .btn-secondary {
            background: #333;
            color: #e0e0e0;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: end;
            margin-bottom: 20px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-group label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .result-item {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            transition: transform 0.3s;
            cursor: pointer;
            border: 1px solid #222;
        }
        .result-item:hover {
            transform: translateY(-3px);
            border-color: #ff6b6b;
        }
        .result-item h3 {
            font-size: 14px;
            margin-bottom: 5px;
            color: #fff;
        }
        .result-item p {
            font-size: 12px;
            color: #888;
        }
        .detail-container {
            margin-top: 20px;
        }
        .detail-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .detail-header img {
            max-width: 200px;
            border-radius: 8px;
        }
        .detail-info {
            flex: 1;
        }
        .detail-info h2 {
            color: #fff;
            margin-bottom: 10px;
        }
        .detail-info .meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .detail-info .meta span {
            background: #1a1a1a;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid #333;
        }
        .chapter-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .chapter-item {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid #222;
            cursor: pointer;
            transition: all 0.3s;
        }
        .chapter-item:hover {
            border-color: #ff6b6b;
            background: #222;
        }
        .chapter-item .download-btn {
            background: #ff6b6b;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 5px;
            font-size: 11px;
        }
        .chapter-item .download-btn:hover {
            background: #ff5252;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .error {
            color: #ff6b6b;
            padding: 20px;
            text-align: center;
            background: #1a0a0a;
            border-radius: 5px;
            border: 1px solid #ff6b6b;
        }
        .success {
            color: #6bff6b;
            padding: 20px;
            text-align: center;
            background: #0a1a0a;
            border-radius: 5px;
            border: 1px solid #6bff6b;
        }
        .images-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .images-container img {
            width: 100%;
            border-radius: 5px;
            border: 1px solid #333;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar .fill {
            height: 100%;
            background: #ff6b6b;
            transition: width 0.3s;
        }
        .status-text {
            text-align: center;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
            }
            input,
            select {
                max-width: 100%;
            }
            .detail-header {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 LUVYAA Scraper</h1>

        <!-- Navigation -->
        <div class="nav">
            <button onclick="showPanel('list')" class="active">List</button>
            <button onclick="showPanel('search')">Search</button>
            <button onclick="showPanel('detail')">Detail</button>
            <button onclick="showPanel('chapter')">Chapter</button>
            <button onclick="showPanel('download')">Download</button>
        </div>

        <!-- Panel: List -->
        <div id="panel-list" class="panel">
            <h2>📖 List Manga/Manhwa/Novel</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>Type</label>
                    <select id="list-type">
                        <option value="manga">Manga</option>
                        <option value="manhua">Manhua</option>
                        <option value="manhwa">Manhwa</option>
                        <option value="novel">Novel</option>
                        <option value="pornwa">Pornwa</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select id="list-status">
                        <option value="">All</option>
                        <option value="ongoing">Ongoing</option>
                        <option value="completed">Completed</option>
                        <option value="hiatus">Hiatus</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Genre ID</label>
                    <input type="text" id="list-genre" placeholder="e.g., 52">
                </div>
                <div class="filter-group">
                    <label>Page</label>
                    <input type="number" id="list-page" value="1" min="1">
                </div>
                <button class="btn-primary" onclick="fetchList()">Search</button>
            </div>
            <div id="list-results"></div>
        </div>

        <!-- Panel: Search -->
        <div id="panel-search" class="panel hidden">
            <h2>🔍 Search</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>Query</label>
                    <input type="text" id="search-query" placeholder="Search title...">
                </div>
                <button class="btn-primary" onclick="fetchSearch()">Search</button>
            </div>
            <div id="search-results"></div>
        </div>

        <!-- Panel: Detail -->
        <div id="panel-detail" class="panel hidden">
            <h2>📝 Detail</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>Slug</label>
                    <input type="text" id="detail-slug" placeholder="e.g., please-bully-me-miss-villainess">
                </div>
                <button class="btn-primary" onclick="fetchDetail()">Get Detail</button>
            </div>
            <div id="detail-results"></div>
        </div>

        <!-- Panel: Chapter -->
        <div id="panel-chapter" class="panel hidden">
            <h2>📄 Chapter Images</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>Slug</label>
                    <input type="text" id="chapter-slug" placeholder="e.g., please-bully-me-miss-villainess">
                </div>
                <div class="filter-group">
                    <label>Chapter Number</label>
                    <input type="number" id="chapter-num" value="1" min="1">
                </div>
                <button class="btn-primary" onclick="fetchChapter()">Get Images</button>
            </div>
            <div id="chapter-results"></div>
        </div>

        <!-- Panel: Download -->
        <div id="panel-download" class="panel hidden">
            <h2>⬇️ Download Chapter</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>Slug</label>
                    <input type="text" id="download-slug" placeholder="e.g., please-bully-me-miss-villainess">
                </div>
                <div class="filter-group">
                    <label>Chapter Number</label>
                    <input type="number" id="download-num" value="1" min="1">
                </div>
                <button class="btn-primary" onclick="fetchDownload()">Download</button>
            </div>
            <div id="download-results"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('panel-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.nav button[onclick="showPanel('${id}')"]`).classList.add('active');
        }

        function formatResult(item) {
            return `
                <div class="result-item" onclick="showDetail('${item.slug}')">
                    <h3>${item.title || item.slug}</h3>
                    <p>${item.slug}</p>
                    ${item.type ? `<p>Type: ${item.type}</p>` : ''}
                    ${item.status ? `<p>Status: ${item.status}</p>` : ''}
                </div>
            `;
        }

        function showDetail(slug) {
            document.getElementById('detail-slug').value = slug;
            showPanel('detail');
            fetchDetail();
        }

        function renderList(data) {
            const container = document.getElementById('list-results');
            if (!data.results || data.results.length === 0) {
                container.innerHTML = '<div class="error">No results found</div>';
                return;
            }
            container.innerHTML = `
                <p>Found ${data.total} results (Page ${data.page})</p>
                <div class="result-grid">
                    ${data.results.map(item => formatResult(item)).join('')}
                </div>
            `;
        }

        function renderSearch(data) {
            const container = document.getElementById('search-results');
            if (!data.results || data.results.length === 0) {
                container.innerHTML = '<div class="error">No results found</div>';
                return;
            }
            container.innerHTML = `
                <p>Found ${data.total} results for "${data.query}"</p>
                <div class="result-grid">
                    ${data.results.map(item => formatResult(item)).join('')}
                </div>
            `;
        }

        function renderDetail(data) {
            const container = document.getElementById('detail-results');
            if (data.error) {
                container.innerHTML = `<div class="error">${data.error}</div>`;
                return;
            }
            container.innerHTML = `
                <div class="detail-container">
                    <div class="detail-header">
                        ${data.thumbnail ? `<img src="${data.thumbnail}" alt="${data.title}">` : ''}
                        <div class="detail-info">
                            <h2>${data.title}</h2>
                            <div class="meta">
                                ${data.type ? `<span>📌 ${data.type}</span>` : ''}
                                ${data.status ? `<span>📊 ${data.status}</span>` : ''}
                                ${data.score ? `<span>⭐ ${data.score}</span>` : ''}
                                ${data.totalChapters ? `<span>📖 ${data.totalChapters} chapters</span>` : ''}
                            </div>
                            ${data.synopsis ? `<p style="margin: 10px 0; color: #aaa;">${data.synopsis}</p>` : ''}
                            ${data.genres && data.genres.length ? `
                                <div class="meta">
                                    ${data.genres.map(g => `<span>#${g.name}</span>`).join('')}
                                </div>
                            ` : ''}
                            ${data.chapters && data.chapters.length ? `
                                <h3>Chapters</h3>
                                <div class="chapter-list">
                                    ${data.chapters.map(num => `
                                        <div class="chapter-item">
                                            Chapter ${num}
                                            <br>
                                            <button class="download-btn" onclick="downloadChapter('${data.slug}', ${num})">⬇️ Download</button>
                                            <button class="download-btn" onclick="viewChapter('${data.slug}', ${num})" style="background: #333;">👁️ View</button>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderChapter(data) {
            const container = document.getElementById('chapter-results');
            if (data.error) {
                container.innerHTML = `<div class="error">${data.error}</div>`;
                return;
            }
            container.innerHTML = `
                <div>
                    <p>Chapter ${data.chapter} - ${data.totalImages} images</p>
                    ${data.prev ? `<p>Previous: ${data.prev}</p>` : ''}
                    ${data.next ? `<p>Next: ${data.next}</p>` : ''}
                    <div class="images-container">
                        ${data.images.map(url => `<img src="${url}" loading="lazy" onclick="window.open('${url}')">`).join('')}
                    </div>
                </div>
            `;
        }

        function renderDownload(data) {
            const container = document.getElementById('download-results');
            if (data.error) {
                container.innerHTML = `<div class="error">${data.error}</div>`;
                return;
            }
            const progress = data.total > 0 ? Math.round((data.downloaded / data.total) * 100) : 0;
            container.innerHTML = `
                <div class="success">
                    <h3>✅ Download Complete!</h3>
                    <p>Chapter ${data.chapter}</p>
                    <p>Downloaded: ${data.downloaded}/${data.total}</p>
                    ${data.failed > 0 ? `<p style="color: #ff6b6b;">Failed: ${data.failed}</p>` : ''}
                    ${data.path ? `<p>Path: ${data.path}</p>` : ''}
                    <div class="progress-bar">
                        <div class="fill" style="width: ${progress}%"></div>
                    </div>
                    <button class="btn-secondary" onclick="viewChapter('${data.slug}', ${data.chapter})">👁️ View Chapter</button>
                </div>
            `;
        }

        function renderError(containerId, error) {
            document.getElementById(containerId).innerHTML = `<div class="error">Error: ${error}</div>`;
        }

        async function fetchList() {
            const container = document.getElementById('list-results');
            container.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const type = document.getElementById('list-type').value;
                const status = document.getElementById('list-status').value;
                const genre = document.getElementById('list-genre').value;
                const page = document.getElementById('list-page').value;
                const res = await fetch(`${API_URL}/list?type=${type}&status=${status}&genre=${genre}&page=${page}`);
                const data = await res.json();
                if (data.success) renderList(data.data);
                else renderError('list-results', data.error);
            } catch (e) {
                renderError('list-results', e.message);
            }
        }

        async function fetchSearch() {
            const container = document.getElementById('search-results');
            container.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const query = document.getElementById('search-query').value;
                if (!query) {
                    renderError('search-results', 'Please enter a search query');
                    return;
                }
                const res = await fetch(`${API_URL}/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if (data.success) renderSearch(data.data);
                else renderError('search-results', data.error);
            } catch (e) {
                renderError('search-results', e.message);
            }
        }

        async function fetchDetail() {
            const container = document.getElementById('detail-results');
            container.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const slug = document.getElementById('detail-slug').value;
                if (!slug) {
                    renderError('detail-results', 'Please enter a slug');
                    return;
                }
                const res = await fetch(`${API_URL}/detail/${slug}`);
                const data = await res.json();
                if (data.success) renderDetail(data.data);
                else renderError('detail-results', data.error);
            } catch (e) {
                renderError('detail-results', e.message);
            }
        }

        async function fetchChapter() {
            const container = document.getElementById('chapter-results');
            container.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const slug = document.getElementById('chapter-slug').value;
                const num = document.getElementById('chapter-num').value;
                if (!slug) {
                    renderError('chapter-results', 'Please enter a slug');
                    return;
                }
                const res = await fetch(`${API_URL}/chapter/${slug}/${num}`);
                const data = await res.json();
                if (data.success) renderChapter(data.data);
                else renderError('chapter-results', data.error);
            } catch (e) {
                renderError('chapter-results', e.message);
            }
        }

        async function fetchDownload() {
            const container = document.getElementById('download-results');
            container.innerHTML = '<div class="loading">Downloading... This may take a moment.</div>';
            try {
                const slug = document.getElementById('download-slug').value;
                const num = document.getElementById('download-num').value;
                if (!slug) {
                    renderError('download-results', 'Please enter a slug');
                    return;
                }
                const res = await fetch(`${API_URL}/download/${slug}/${num}`);
                const data = await res.json();
                if (data.success) renderDownload(data.data);
                else renderError('download-results', data.error);
            } catch (e) {
                renderError('download-results', e.message);
            }
        }

        function viewChapter(slug, num) {
            document.getElementById('chapter-slug').value = slug;
            document.getElementById('chapter-num').value = num;
            showPanel('chapter');
            fetchChapter();
        }

        function downloadChapter(slug, num) {
            document.getElementById('download-slug').value = slug;
            document.getElementById('download-num').value = num;
            showPanel('download');
            fetchDownload();
        }

        // Auto load list on page load
        window.onload = () => fetchList();
    </script>
</body>
</html>
